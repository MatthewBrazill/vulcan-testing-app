<!DOCTYPE html>
<html>

<head>
    {{> head}}
    <link rel="stylesheet" href="/css/storage.css">
    <script src="/js/storage.min.js"></script>
</head>

<body>
    <nav>
        {{> nav}}
    </nav>

    <div id="content">
        <div id="storage-box">

            <!-- Sidebar: secondary tools -->
            <div id="storage-sidebar">

                <div id="testing-section">
                    <h5>Testing Tools</h5>
                    <div class="ui fluid right action input">
                        <input id="testing-log-input" placeholder="Log text..." type="text">
                        <select id="testing-log-dropdown" class="ui compact selection dropdown">
                            <option value="console">Console</option>
                            <option value="datadog">Datadog SDK</option>
                        </select>
                    </div>
                    <div id="testing-buttons">
                        <button id="testing-error-button" class="ui button">Trigger UI Error</button>
                        <button id="testing-custom-event-button" class="ui button">Custom RUM Event</button>
                        <button id="clear-cookie-button" class="ui button">Clear Cookies</button>
                        <a href="/user/{{username}}" class="ui blue button">View Users</a>
                    </div>
                </div>

                <div id="divination-section">
                    <h5>Divination Tools</h5>
                    <textarea id="divination-input" placeholder="What might the future hold?" rows="3"></textarea>
                    <div id="divination-controls">
                        <select id="divination-dropdown" class="ui compact selection dropdown">
                            <option value="delphi">Delphi</option>
                            <option value="didyma">Didyma</option>
                            <option value="cumae">Cumae</option>
                        </select>
                        <button id="divination-submit" class="ui positive button">Ask</button>
                    </div>
                    <div id="divination-output">
                        <div id="divination-output-loader" class="ui hidden centered inline text loader">Petitioning the Oracle...</div>
                        <p id="divination-output-text"></p>
                    </div>
                </div>

            </div>

            <!-- Main: god search (primary feature) -->
            <div id="god-search-section">
                <h5>God Search</h5>
                <div class="ui fluid left icon action input">
                    <i class="ui search icon"></i>
                    <input id="god-search-bar" placeholder="Search gods..." type="text">
                    <a id="god-add-button" href="/add" class="ui positive vertical animated button">
                        <div class="visible content">Add God</div>
                        <div class="hidden content"><i class="plus icon"></i></div>
                    </a>
                </div>

                <div id="god-list">
                    <div id="god-list-loader" class="ui hidden centered inline text loader">Loading Gods</div>
                    <div id="god-list-error" class="ui hidden error message">
                        <div id="god-list-error-head" class="header">Failed to retrieve list of gods!</div>
                        <p id="god-list-error-message">There was an issue getting to the server.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer>
        {{> footer}}
    </footer>
</body>

</html>
