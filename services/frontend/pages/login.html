<!DOCTYPE html>
<html>

<head>
    {{> head}}
    <link rel="stylesheet" href="/css/login.css">
    <script src="/js/login.min.js"></script>
</head>

<body>
    <nav>
        {{> nav}}
    </nav>

    <div id="content">
        <div id="login-box">
            <form id="login-form" class="form">
                <div class="form-field">
                    <input id="login-username" type="text" autocomplete="username" placeholder="Username">
                </div>

                <div class="form-field">
                    <input id="login-password" type="password" autocomplete="current-password" placeholder="Password">
                </div>

                <!-- Reserved-height wrapper prevents the buttons from shifting
                     when the wait or error message appears (CLS fix) -->
                <div id="login-message-area">
                    <div id="login-wait" class="msg msg-hidden">
                        <div id="login-wait-head" class="msg-header" style="margin-bottom: 12px;">Logging In...</div>
                        <div id="login-wait-message" class="loader loader-active"></div>
                    </div>

                    <div class="msg msg-error">
                        <div id="login-error-head" class="msg-header">Login Failed!</div>
                        <p id="login-error-message">There was an error.</p>
                    </div>
                </div>

                <button id="login-submit" class="btn btn-primary btn-fluid">Login</button>
                <a href="/user/join" class="btn btn-secondary btn-fluid">Sign Up</a>
            </form>
        </div>
    </div>

    <footer>
        {{> footer}}
    </footer>
</body>

</html>
