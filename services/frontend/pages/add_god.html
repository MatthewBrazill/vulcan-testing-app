<!DOCTYPE html>
<html>

<head>
    {{> head}}
    <link rel="stylesheet" href="/css/add_god.css">
    <script src="/js/add_god.min.js"></script>
</head>

<body>
    <nav>
        {{> nav}}
    </nav>

    <div id="content">
        <div id="add-god-box">
            <form id="add-god-form" class="form">
                <div class="form-field">
                    <label>Pantheon</label>
                    <input id="add-god-pantheon" type="text" placeholder="e.g. Greek">
                </div>

                <div class="form-field">
                    <label>Name</label>
                    <input id="add-god-name" type="text" placeholder="e.g. Athena">
                </div>

                <div class="form-field">
                    <label>Domain</label>
                    <input id="add-god-domain" type="text" placeholder="e.g. Wisdom">
                </div>

                <div class="msg msg-error">
                    <div id="add-god-error-head" class="msg-header">Failed to add god!</div>
                    <p id="add-god-error-message">There was an error.</p>
                </div>

                <div id="add-god-status-area">
                    <div id="add-god-loader" class="loader">Adding God</div>
                </div>

                <button id="add-god-submit" class="btn btn-primary btn-fluid">Add God</button>
            </form>
        </div>
    </div>

    <footer>
        {{> footer}}
    </footer>
</body>

</html>
