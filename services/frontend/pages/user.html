<!DOCTYPE html>
<html>

<head>
    {{> head}}
    <link rel="stylesheet" href="/css/user.css">
    <script src="/js/user.min.js"></script>
</head>

<body>
    <nav>
        {{> nav}}
    </nav>

    <div id="content">
        <div id="user-box">

            {{#user}}
            <div id="selected-user">
                <p id="selected-user-heading">Profile</p>

                <div class="user-detail-row">
                    <span class="user-detail-label">Username</span>
                    <span class="user-detail-value" id="selected-user-name">{{username}}</span>
                </div>

                <div class="user-detail-row">
                    <span class="user-detail-label">Permissions</span>
                    <span class="user-detail-value" id="selected-user-permissions">{{permissions}}</span>
                </div>

                <div class="user-detail-row">
                    <span class="user-detail-label">Notes</span>
                    <span id="no-user-notes" class="user-detail-value">None</span>
                </div>
                <ul id="selected-user-notes"></ul>
            </div>
            {{/user}}

            <div id="user-list-panel">
                <p id="user-list-heading">All Users</p>
                <div id="user-list">
                    <div id="user-list-loader" class="loader">Loading Users</div>
                    <div id="user-list-error" class="msg msg-hidden msg-error">
                        <div id="user-list-error-head" class="msg-header">Failed to retrieve list of users!</div>
                        <p id="user-list-error-message">There was an issue getting to the server.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer>
        {{> footer}}
    </footer>
</body>

</html>
