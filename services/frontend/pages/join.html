<!DOCTYPE html>
<html>

<head>
    {{> head}}
    <link rel="stylesheet" href="/css/join.css">
    <script src="/js/join.min.js"></script>
</head>

<body>
    <nav>
        {{> nav}}
    </nav>

    <div id="content">
        <div id="sign-up-box">
            <form id="sign-up-form" class="form">
                <div class="form-field">
                    <input id="sign-up-username" type="text" autocomplete="username" placeholder="Username">
                </div>

                <div class="form-field">
                    <input id="sign-up-password" type="password" autocomplete="password" placeholder="Password">
                </div>

                <!-- Reserved-height wrapper prevents the buttons from shifting
                     when any of the three message states appears (CLS fix) -->
                <div id="sign-up-message-area">
                    <div id="sign-up-wait" class="msg msg-hidden">
                        <div id="sign-up-wait-head" class="msg-header">Signing Up...</div>
                        <div id="sign-up-wait-loader" class="loader loader-active" style="margin-top: 12px;"></div>
                    </div>

                    <div class="msg msg-error">
                        <div id="sign-up-error-head" class="msg-header">Sign Up Failed!</div>
                        <p id="sign-up-error-message">There was an error.</p>
                    </div>

                    <div class="msg msg-success">
                        <div id="sign-up-success-head" class="msg-header">Sign Up Succeeded!</div>
                        <p id="sign-up-success-message">You have successfully signed up! Logging you in...</p>
                        <div id="sign-up-success-loader" class="loader loader-active"></div>
                    </div>
                </div>

                <button id="sign-up-submit" class="btn btn-primary btn-fluid">Sign Up</button>
                <a href="/login" class="btn btn-secondary btn-fluid">Log In</a>
            </form>
        </div>
    </div>

    <footer>
        {{> footer}}
    </footer>
</body>

</html>
