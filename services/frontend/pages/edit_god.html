<!DOCTYPE html>
<html>

<head>
    {{> head}}
    <link rel="stylesheet" href="/css/edit_god.css">
    <script src="/js/edit_god.min.js"></script>
</head>

<body>
    <nav>
        {{> nav}}
    </nav>

    <div id="content">
        <div id="edit-god-box">
            <form id="edit-god-form" class="form">
                <div class="form-field">
                    <label>Pantheon</label>
                    <input id="edit-god-pantheon" type="text" placeholder="God Pantheon">
                </div>

                <div class="form-field">
                    <label>Name</label>
                    <input id="edit-god-name" type="text" placeholder="God Name">
                </div>

                <div class="form-field">
                    <label>Domain</label>
                    <input id="edit-god-domain" type="text" placeholder="God Domain">
                </div>

                <div class="form-field">
                    <label>Description</label>
                    <!-- Pre-sized with min-height in CSS — prevents jump when text loads -->
                    <p id="god-description"></p>
                </div>

                <div class="msg msg-error">
                    <div id="edit-god-error-head" class="msg-header">Failed to update/delete god!</div>
                    <p id="edit-god-error-message">There was an error.</p>
                </div>

                <div id="edit-god-status-area">
                    <div id="god-load-loader" class="loader loader-active">Loading God</div>
                    <div id="god-update-loader" class="loader">Updating God</div>
                    <div id="god-delete-loader" class="loader">Deleting God</div>
                </div>

                <button id="edit-god-buttom" class="btn btn-primary btn-fluid">Update God</button>
                <button type="button" id="delete-god-button" class="btn btn-danger btn-fluid">Delete God</button>
            </form>
        </div>
    </div>

    <footer>
        {{> footer}}
    </footer>
</body>

</html>
